name: Detect new storms and post their report

on:
  schedule:
    - cron: '5 3 * * *'
    - cron: '5 9 * * *'
    - cron: '5 15 * * *'
    - cron: '5 21 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode - skip posting to Bluesky'
        required: false
        default: 'false'
        type: boolean

jobs:
  detect-and-post:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - uses: actions/cache@v4
      id: storm-cache
      with:
        path: known_storms.json
        key: known-storms-${{ github.run_id }}
        restore-keys: "known-storms-"
    - run: pip install requests
    - run: python3 detect_storms.py > result.json
      env:
        BASINS: 'ATL,EPAC,CPAC,ATL-ES,EPAC-ES'
    - run: cat result.json
    - run: python3 post_storm.py
      env:
        PDS_URL: 'https://bsky.social'
        BLUESKY_USER_ATL: ${{ secrets.BLUESKY_USER_ATL }}
        BLUESKY_PASS_ATL: ${{ secrets.BLUESKY_PASS_ATL }}
        BLUESKY_USER_EPAC: ${{ secrets.BLUESKY_USER_EPAC }}
        BLUESKY_PASS_EPAC: ${{ secrets.BLUESKY_PASS_EPAC }}
        BLUESKY_USER_CPAC: ${{ secrets.BLUESKY_USER_CPAC }}
        BLUESKY_PASS_CPAC: ${{ secrets.BLUESKY_PASS_CPAC }}
        BLUESKY_USER_ATL_ES: ${{ secrets.BLUESKY_USER_ATL_ES }}
        BLUESKY_PASS_ATL_ES: ${{ secrets.BLUESKY_PASS_ATL_ES }}
        BLUESKY_USER_EPAC_ES: ${{ secrets.BLUESKY_USER_EPAC_ES }}
        BLUESKY_PASS_EPAC_ES: ${{ secrets.BLUESKY_PASS_EPAC_ES }}
        WILL_SKEET: 'True'
        DEBUG: ${{ inputs.debug }}