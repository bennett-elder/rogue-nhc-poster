        BLUESKY_USER: ${{ secrets.BLUESKY_USER_ATL_ES }}
        BLUESKY_PASS: ${{ secrets.BLUESKY_PASS_ATL_ES }}
        DEBUG: ${{ inputs.debug }}
      run: |
        python ./two.py
  EPAC:
    environment: EPAC 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
