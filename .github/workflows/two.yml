    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run two.py
      env:
        TWO_REGION: EPAC
        BLUESKY_USER: ${{ secrets.BLUESKY_USER_EPAC }}
        BLUESKY_PASS: ${{ secrets.BLUESKY_PASS_EPAC }}
        DEBUG: ${{ inputs.debug }}
      run: |
        python ./two.py
  EPAC-ES:
    environment: EPAC-ES 
